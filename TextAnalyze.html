<!DOCTYPE html>
<html>
<head>
    <title>Text Analyzer</title>

    <style>
        h1 {
            text-align: center;
        }

        body {
            font-family: 'Times New Roman';
            padding: 20px;
        }

        textarea {
            width: 1000px;
            height: 200px;
            background-color: #e6e7f1;
        }


    button {
        font-family: Arial;
            padding: 20px;


            padding: 10px;
            margin-top: 5px;
            background-color: #e6e7f1;
        }

         #result {
            margin-top: 5px;
            border: 3px solid black;
            padding: 30px;
            background-color: #aab0d7;
        }




    </style>


</head>
<body>

    <h1>Text Analysis Tool</h1>

     <textarea id="text" placeholder="Write text here..."></textarea>

    <br><br>

    <h3>Click here to analyze the text</h3>

    <button onclick="analyzeText()">Analyze Text</button>

    <h3>Results:--</h3>


    <div id="result"></div>


    <script>


        function analyzeText() {

            let text = document.getElementById("text").value;

           


            git commit -am ""
            if (text.trim() === "") {
                document.getElementById("result").innerHTML =
                    "Please write something!";
                return;
            }

           
            let charCount = text.length;

        
            let words = text.trim().split(/\s+/);
            let wordCount = words.length;

        
            let reversed = text.split("").reverse().join("");

            
            document.getElementById("result").innerHTML =
                "Total Characters: " + charCount + "<br>" +
                "Total Words: " + wordCount + "<br>" +
                "Reversed Text: " + reversed;

        }

    </script>

</body>
</html>

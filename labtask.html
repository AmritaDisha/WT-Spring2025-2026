<!DOCTYPE html>
<html>
<head>
<title>University Admission Form</title>
</head>
<body>
 
<h1>Online University Admission Form</h1>
<p>Welcome to the page. Fill all the details to complete your admission.</p>
&nbsp;



<fieldset>
<h2><b>Personal Info:</b></h2>
<p>First Name:</pp><input type="text">
<p>Gender:</pp>
<select gender="gender" required>
    
    <option value="">Male</option>
    <option value="">Female</option>

</select>
<p>Age:</pp><input type="number">
<p>Date of Birth:</pp><input type="number">
<p>Mobile:</pp><input type="number">
<p>Email:</pp><input type="text">
</fieldset>


<fieldset>
<h2>Academic Info:</h2>

<p>SSC Passing Year: </pp><input type="number">
<p>SSC GPA: </pp><input type="number">
<p>HSC Passing Year: </pp><input type="number">
<p>HSC GPA: </pp><input type="number">
</fieldset>




<fieldset>
<h2>Preferred department: </h2>
<select name="department" required>
    <option value="">Available Department</option>
    <option value="">Computer science and Engineering</option>"
    <option value="">Electrical and Electronic Engineering</option>"
    <option value="">Pharmacy</option>"
    <option value="">Business Administration</option>"
    <option value="">English</option>"
</select>

<input type="Reset" value="Reset Application">
<input type="submit" value="Submit Application">



 
</body>
</html>
